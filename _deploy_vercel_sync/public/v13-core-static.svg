<svg width="192" height="192" viewBox="0 0 192 192" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background Glow -->
  <defs>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:0" />
    </radialGradient>
    <filter id="blur">
      <feGaussianBlur in="SourceGraphic" stdDeviation="4" />
    </filter>
  </defs>
  
  <!-- Outer Glow -->
  <circle cx="96" cy="96" r="90" fill="url(#glow)" filter="url(#blur)" />
  
  <!-- Outer Ring -->
  <circle cx="96" cy="96" r="80" stroke="#3b82f6" stroke-width="2" fill="none" opacity="0.3" />
  <circle cx="96" cy="96" r="80" stroke="#3b82f6" stroke-width="2" fill="none" opacity="1" stroke-dasharray="125 377" />
  
  <!-- Middle Ring -->
  <circle cx="96" cy="96" r="70" stroke="#8b5cf6" stroke-width="2" fill="none" opacity="0.2" />
  <circle cx="96" cy="96" r="70" stroke="#8b5cf6" stroke-width="2" fill="none" opacity="0.6" stroke-dasharray="110 330" />
  
  <!-- Inner Glow Circle -->
  <circle cx="96" cy="96" r="60" fill="#3b82f6" opacity="0.1" filter="url(#blur)" />
  
  <!-- Core Center -->
  <circle cx="96" cy="96" r="50" fill="#050505" stroke="#3b82f6" stroke-width="1" opacity="0.4" />
  
  <!-- Globe Icon (simplified) -->
  <circle cx="96" cy="96" r="20" stroke="#60a5fa" stroke-width="2" fill="none" />
  <path d="M 96 76 Q 106 96 96 116" stroke="#60a5fa" stroke-width="1.5" fill="none" />
  <path d="M 96 76 Q 86 96 96 116" stroke="#60a5fa" stroke-width="1.5" fill="none" />
  <line x1="76" y1="96" x2="116" y2="96" stroke="#60a5fa" stroke-width="1.5" />
  
  <!-- Orbiting Particles -->
  <circle cx="96" cy="46" r="3" fill="#60a5fa" />
  <circle cx="139" cy="119" r="3" fill="#60a5fa" />
  <circle cx="53" cy="119" r="3" fill="#60a5fa" />
  
  <!-- Status Badge Background -->
  <rect x="10" y="160" width="90" height="20" rx="10" fill="#3b82f6" opacity="0.1" />
  <rect x="10" y="160" width="90" height="20" rx="10" stroke="#3b82f6" stroke-width="1" fill="none" opacity="0.3" />
  
  <!-- Status Text -->
  <text x="55" y="173" font-family="monospace" font-size="10" fill="#60a5fa" text-anchor="middle">V13 CORE</text>
</svg>
