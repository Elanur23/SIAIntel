<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Offline - US News Today</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .container {
      background: white;
      border-radius: 20px;
      padding: 60px 40px;
      text-align: center;
      max-width: 500px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
    }
    .icon {
      font-size: 80px;
      margin-bottom: 20px;
    }
    h1 {
      font-size: 32px;
      color: #333;
      margin-bottom: 16px;
    }
    p {
      font-size: 18px;
      color: #666;
      line-height: 1.6;
      margin-bottom: 30px;
    }
    .button {
      display: inline-block;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 16px 32px;
      border-radius: 50px;
      text-decoration: none;
      font-weight: 600;
      font-size: 16px;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .button:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(102, 126, 234, 0.4);
    }
    .status {
      margin-top: 30px;
      padding: 16px;
      background: #f0f0f0;
      border-radius: 10px;
      font-size: 14px;
      color: #666;
    }
    .online {
      color: #10b981;
      font-weight: 600;
    }
    .offline {
      color: #ef4444;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">📡</div>
    <h1>You're Offline</h1>
    <p>It looks like you've lost your internet connection. Don't worry, we'll reconnect you as soon as you're back online.</p>
    <a href="/" class="button" onclick="window.location.reload(); return false;">Try Again</a>
    <div class="status">
      Connection Status: <span id="status" class="offline">Offline</span>
    </div>
  </div>

  <script>
    // Check connection status
    function updateStatus() {
      const status = document.getElementById('status')
      if (navigator.onLine) {
        status.textContent = 'Online'
        status.className = 'online'
        // Auto-reload when back online
        setTimeout(() => {
          window.location.reload()
        }, 1000)
      } else {
        status.textContent = 'Offline'
        status.className = 'offline'
      }
    }

    // Listen for connection changes
    window.addEventListener('online', updateStatus)
    window.addEventListener('offline', updateStatus)

    // Initial check
    updateStatus()

    // Check every 5 seconds
    setInterval(updateStatus, 5000)
  </script>
</body>
</html>
