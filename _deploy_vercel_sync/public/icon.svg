<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <!-- Dark background matching Mission Control theme -->
  <rect width="512" height="512" fill="#0B0F19"/>
  
  <!-- Gradient circle background -->
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3B82F6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8B5CF6;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Main circle -->
  <circle cx="256" cy="256" r="180" fill="url(#grad1)" opacity="0.2"/>
  <circle cx="256" cy="256" r="150" fill="url(#grad1)" opacity="0.3"/>
  
  <!-- Rocket icon (simplified) -->
  <g transform="translate(256, 256)">
    <!-- Rocket body -->
    <path d="M 0,-80 L 30,-20 L 30,40 L 20,60 L -20,60 L -30,40 L -30,-20 Z" 
          fill="#3B82F6" stroke="#60A5FA" stroke-width="3"/>
    
    <!-- Rocket window -->
    <circle cx="0" cy="-30" r="20" fill="#1E293B" stroke="#60A5FA" stroke-width="2"/>
    <circle cx="0" cy="-30" r="12" fill="#3B82F6" opacity="0.5"/>
    
    <!-- Rocket fins -->
    <path d="M -30,-20 L -60,0 L -30,20 Z" fill="#1E40AF" stroke="#60A5FA" stroke-width="2"/>
    <path d="M 30,-20 L 60,0 L 30,20 Z" fill="#1E40AF" stroke="#60A5FA" stroke-width="2"/>
    
    <!-- Rocket flame -->
    <path d="M -15,60 L 0,90 L 15,60 Z" fill="#F59E0B" opacity="0.8"/>
    <path d="M -10,60 L 0,80 L 10,60 Z" fill="#FCD34D" opacity="0.9"/>
  </g>
  
  <!-- Text -->
  <text x="256" y="420" font-family="Arial, sans-serif" font-size="48" font-weight="bold" 
        fill="#FFFFFF" text-anchor="middle">MISSION</text>
  <text x="256" y="460" font-family="Arial, sans-serif" font-size="36" font-weight="bold" 
        fill="#3B82F6" text-anchor="middle">CONTROL</text>
</svg>
